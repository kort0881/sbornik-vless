name: sbornik-vless

on:
  schedule:
    - cron: "0 * * * *"   # каждый час (UTC)
  workflow_dispatch:

jobs:
  sbornik-vless-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # опционально: Mirror с DRY_RUN, если нужно
      # - name: Run Mirror.py (dry)
      #   env:
      #     MIRROR_DRY_RUN: "1"
      #   run: python Mirror.py

      - name: Run sbornik main.py
        run: python main.py

      # здесь твой скрипт, который собирает subscriptions
      # - name: Build subscriptions file
      #   run: python build_subscriptions.py

      - name: Post subscriptions to Telegram
        env:
          TELEGRAM_BOT_TOKEN_PUBLIC: ${{ secrets.TELEGRAM_BOT_TOKEN_PUBLIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_CHANNEL: ${{ secrets.TELEGRAM_PRIVATE_CHANNEL }}
          TELEGRAM_DRY_RUN: "0"   # поставь "1", если хочешь погонять без отправки
        run: python subscriptions_poster.py
